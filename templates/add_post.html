{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>새 글 작성</title>
  <link rel="icon" href="{% static 'img/listeners_logo_color_transparent.png' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { background: #f5f5f5; }
    .page-wrapper { max-width: 1400px; margin: 0 auto; padding: 24px; }
    h2 { margin-bottom: 20px; font-size: 1.4rem; font-weight: 700; }

    .meta-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .meta-row input, .meta-row select { flex: 1; min-width: 180px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    .meta-row input[name="title"] { flex: 3; }

    .editor-container { display: flex; gap: 12px; height: 600px; margin-bottom: 16px; }
    .editor-pane, .preview-pane { flex: 1; display: flex; flex-direction: column; }
    .pane-label { font-size: 12px; font-weight: 600; color: #666; padding: 6px 10px; background: #e9ecef; border-radius: 6px 6px 0 0; border: 1px solid #ddd; border-bottom: none; }
    #content_editor { flex: 1; padding: 12px; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.6; border: 1px solid #ddd; border-radius: 0 0 6px 6px; resize: none; outline: none; }
    #content_editor:focus { border-color: #007bff; }
    .preview-body { flex: 1; padding: 16px; border: 1px solid #ddd; border-radius: 0 0 6px 6px; overflow-y: auto; background: #fff; font-size: 14px; line-height: 1.8; }
    .preview-body img { max-width: 100%; border-radius: 4px; margin: 8px 0; }

    .section-card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    .section-card h4 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #333; }
    .image-gallery { display: flex; flex-wrap: wrap; gap: 8px; max-height: 180px; overflow-y: auto; }
    .image-gallery img { width: 80px; height: 80px; object-fit: cover; cursor: pointer; border: 2px solid transparent; border-radius: 6px; transition: border-color 0.15s; }
    .image-gallery img:hover { border-color: #007bff; }
    .image-gallery img.selected { border-color: #007bff; box-shadow: 0 0 0 2px rgba(0,123,255,0.3); }
    .card-preview-img { max-width: 240px; border-radius: 8px; margin-top: 10px; border: 1px solid #ddd; }
    .upload-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    .upload-row input[type=file] { flex: 1; font-size: 13px; }

    .author-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .author-row > div { flex: 1; min-width: 200px; }
    .author-row label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 4px; }
    .author-row input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }

    .submit-btn { width: 100%; padding: 14px; font-size: 16px; font-weight: 600; border-radius: 8px; }
    .editor-wrapper { position: relative; flex: 1; display: flex; flex-direction: column; }
    .uploading-indicator { display: none; position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); color: white; padding: 6px 14px; border-radius: 6px; font-size: 12px; z-index: 100; }
  </style>
</head>
<body>
  <header>{% include 'navbar.html' %}</header>
  <div class="page-wrapper">
    <h2>📝 새 글 작성</h2>
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="meta-row">
        <input type="text" name="title" placeholder="제목" required>
        <select name="category">
          {% for cat in categories %}
          <option value="{{ cat }}">{{ cat }}</option>
          {% endfor %}
        </select>
        <input type="text" name="subcategory" placeholder="서브카테고리 (선택)">
      </div>

      <div class="editor-container">
        <div class="editor-pane">
          <div class="pane-label">✍️ 마크다운 편집 — 이미지 붙여넣기 가능</div>
          <div class="editor-wrapper">
            <div class="uploading-indicator" id="uploading_indicator">⏫ 이미지 업로드 중...</div>
            <textarea id="content_editor" name="content" placeholder="마크다운으로 작성하세요..."></textarea>
          </div>
        </div>
        <div class="preview-pane">
          <div class="pane-label">👁 미리보기</div>
          <div class="preview-body" id="preview_body"></div>
        </div>
      </div>

      <div class="section-card">
        <h4>📷 본문 이미지 삽입 — 클릭하면 커서 위치에 삽입</h4>
        <div class="image-gallery" id="content_image_gallery">
          {% for image in s3_images %}
          <img src="{{ image }}" onclick="insertImage('{{ image }}')" title="{{ image }}">
          {% endfor %}
        </div>
      </div>

      <div class="section-card">
        <h4>🖼 카드 이미지 (배너 & 넷플릭스 카드에 표시)</h4>
        <div class="upload-row">
          <input type="file" id="upload_card_image" accept="image/*">
          <button type="button" class="btn btn-outline-primary btn-sm" id="upload_btn">업로드</button>
        </div>
        <div class="image-gallery" id="card_image_gallery">
          {% for image in s3_images %}
          <img src="{{ image }}" onclick="selectCardImage('{{ image }}', this)" title="{{ image }}">
          {% endfor %}
        </div>
        <input type="hidden" name="selected_card_image" id="selected_card_image_hidden">
        <img id="selected_card_image_preview" src="" class="card-preview-img" style="display:none;">
      </div>

      <div class="section-card">
        <h4>👤 작성자</h4>
        <div class="author-row">
          <div>
            <label>작성자 이름</label>
            <input type="text" name="author" value="{{ request.user.username }}" required>
          </div>
          <div>
            <label>작성자 이미지 (업로드)</label>
            <input type="file" name="author_image" accept="image/*">
          </div>
          <div>
            <label>작성자2 (선택)</label>
            <input type="text" name="author2" placeholder="">
          </div>
          <div>
            <label>작성자2 이미지 (업로드)</label>
            <input type="file" name="author_image2" accept="image/*">
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary submit-btn">글 등록</button>
    </form>
  </div>

  <script>
    const editor = document.getElementById("content_editor");
    const preview = document.getElementById("preview_body");
    const uploadingIndicator = document.getElementById("uploading_indicator");

    function updatePreview() {
      preview.innerHTML = marked.parse(editor.value || "");
    }
    editor.addEventListener("input", updatePreview);
    updatePreview();

    editor.addEventListener("paste", function(event) {
      const items = (event.clipboardData || event.originalEvent.clipboardData).items;
      for (let item of items) {
        if (item.kind === "file" && item.type.startsWith("image/")) {
          event.preventDefault();
          uploadAndInsertImage(item.getAsFile());
        }
      }
    });

    function uploadAndInsertImage(file) {
      uploadingIndicator.style.display = "block";
      const pos = editor.selectionStart;
      const placeholder = `![업로드중...](...)`;
      editor.value = editor.value.substring(0, pos) + `\n\n${placeholder}\n\n` + editor.value.substring(pos);
      updatePreview();

      const formData = new FormData();
      formData.append("image", file);
      fetch("{% url 'upload_image_ajax' %}", {
        method: "POST",
        body: formData,
        headers: { "X-CSRFToken": "{{ csrf_token }}" }
      })
      .then(res => res.json())
      .then(data => {
        uploadingIndicator.style.display = "none";
        if (data.image_url) {
          editor.value = editor.value.replace(placeholder, `![이미지](${data.image_url})`);
          updatePreview();
        } else {
          editor.value = editor.value.replace(`\n\n${placeholder}\n\n`, "");
          alert("이미지 업로드 실패: " + data.error);
          updatePreview();
        }
      })
      .catch(() => {
        uploadingIndicator.style.display = "none";
        editor.value = editor.value.replace(`\n\n${placeholder}\n\n`, "");
        alert("업로드 중 오류 발생");
        updatePreview();
      });
    }

    function insertImage(imageUrl) {
      const pos = editor.selectionStart;
      editor.value = editor.value.substring(0, pos) + `\n\n![이미지](${imageUrl})\n\n` + editor.value.substring(pos);
      editor.focus();
      updatePreview();
    }

    function selectCardImage(imageUrl, imgElement) {
      document.getElementById("selected_card_image_hidden").value = imageUrl;
      const p = document.getElementById("selected_card_image_preview");
      p.src = imageUrl;
      p.style.display = "block";
      document.querySelectorAll("#card_image_gallery img").forEach(img => img.classList.remove("selected"));
      imgElement.classList.add("selected");
    }

    document.getElementById("upload_btn").addEventListener("click", function() {
      const file = document.getElementById("upload_card_image").files[0];
      if (!file) { alert("파일을 선택하세요"); return; }
      const formData = new FormData();
      formData.append("image", file);
      fetch("{% url 'upload_image_ajax' %}", {
        method: "POST",
        body: formData,
        headers: { "X-CSRFToken": "{{ csrf_token }}" }
      })
      .then(res => res.json())
      .then(data => {
        if (data.image_url) {
          document.getElementById("selected_card_image_hidden").value = data.image_url;
          const p = document.getElementById("selected_card_image_preview");
          p.src = data.image_url;
          p.style.display = "block";
        } else {
          alert("업로드 실패: " + data.error);
        }
      });
    });
  </script>
</body>
</html>
