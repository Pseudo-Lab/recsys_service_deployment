{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>글 수정 - {{ post.title }}</title>
  <link rel="icon" href="{% static 'img/listeners_logo_color_transparent.png' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">
  <style>
    body { background: #f5f5f5; }
    .page-wrapper { max-width: 1200px; margin: 0 auto; padding: 24px; }
    h2 { margin-bottom: 20px; font-size: 1.4rem; font-weight: 700; }
    .meta-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .meta-row input, .meta-row select { flex: 1; min-width: 180px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    .meta-row input[name="title"] { flex: 3; }
    .section-card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    .section-card h4 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #333; }
    .image-gallery { display: flex; flex-wrap: wrap; gap: 8px; max-height: 180px; overflow-y: auto; }
    .image-gallery img { width: 80px; height: 80px; object-fit: cover; cursor: pointer; border: 2px solid transparent; border-radius: 6px; transition: border-color 0.15s; }
    .image-gallery img:hover { border-color: #007bff; }
    .image-gallery img.selected { border-color: #007bff; box-shadow: 0 0 0 2px rgba(0,123,255,0.3); }
    .card-preview-img { max-width: 240px; border-radius: 8px; margin-top: 10px; border: 1px solid #ddd; }
    .upload-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    .upload-row input[type=file] { flex: 1; font-size: 13px; }
    .author-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .author-row > div { flex: 1; min-width: 200px; }
    .author-row label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 4px; }
    .author-row input, .author-row select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
    .submit-btn { width: 100%; padding: 14px; font-size: 16px; font-weight: 600; border-radius: 8px; margin-top: 8px; }
    #editor { margin-bottom: 16px; }
  </style>
</head>
<body>
  <header>{% include 'navbar.html' %}</header>
  <div class="page-wrapper">
    <h2>✏️ 글 수정</h2>
    <form method="POST" enctype="multipart/form-data" id="post-form">
      {% csrf_token %}

      <div class="meta-row">
        <input type="text" name="title" value="{{ post.title }}" placeholder="제목" required>
        <select name="category">
          {% for cat in categories %}
          <option value="{{ cat }}" {% if post.category == cat %}selected{% endif %}>{{ cat }}</option>
          {% endfor %}
        </select>
        <input type="text" name="subcategory" value="{{ post.subcategory }}" placeholder="서브카테고리 (선택)">
      </div>

      <!-- WYSIWYG 에디터 -->
      <div class="section-card" style="padding: 0; overflow: hidden;">
        <div id="editor"></div>
      </div>
      <textarea name="content" id="content_hidden" style="display:none;">{{ post.content }}</textarea>

      <!-- 카드 이미지 -->
      <div class="section-card">
        <h4>🖼 카드 이미지 (배너 & 넷플릭스 카드에 표시)</h4>
        <div class="upload-row">
          <input type="file" id="upload_card_image" accept="image/*">
          <span id="upload_status" style="font-size:13px; color:#666;"></span>
        </div>
        <div class="image-gallery" id="card_image_gallery">
          {% for image in s3_images %}
          <img src="{{ image }}" onclick="selectCardImage('{{ image }}', this)" title="{{ image }}">
          {% endfor %}
        </div>
        <input type="hidden" name="selected_card_image" id="selected_card_image_hidden" value="{% if post.card_image %}{{ post.card_image }}{% endif %}">
        {% if post.card_image %}
        <p style="font-size:12px;color:#888;margin-top:8px;">현재 카드 이미지:</p>
        <img id="selected_card_image_preview" src="{{ post.card_image }}" class="card-preview-img">
        {% else %}
        <p style="font-size:12px;color:#aaa;margin-top:8px;">카드 이미지 없음 — 위에서 선택하거나 업로드하세요</p>
        <img id="selected_card_image_preview" src="" class="card-preview-img" style="display:none;">
        {% endif %}
      </div>

      <!-- 작성자 -->
      <div class="section-card">
        <h4>👤 작성자</h4>
        <div class="author-row">
          <div>
            <label>작성자</label>
            <select name="author">
              {% for a in authors %}
              <option value="{{ a }}" {% if post.author == a %}selected{% endif %}>{{ a }}</option>
              {% endfor %}
              <option value="__custom__">직접 입력...</option>
            </select>
            <input type="text" id="author_custom" placeholder="이름 직접 입력" style="display:none; margin-top:6px;">
          </div>
          <div>
            <label>작성자 이미지 (새로 업로드)</label>
            <input type="file" name="author_image" accept="image/*">
          </div>
          <div>
            <label>작성자2 (선택)</label>
            <select name="author2">
              <option value="">없음</option>
              {% for a in authors %}
              <option value="{{ a }}" {% if post.author2 == a %}selected{% endif %}>{{ a }}</option>
              {% endfor %}
              <option value="__custom__">직접 입력...</option>
            </select>
            <input type="text" id="author2_custom" placeholder="이름 직접 입력" style="display:none; margin-top:6px;">
          </div>
          <div>
            <label>작성자2 이미지 (새로 업로드)</label>
            <input type="file" name="author_image2" accept="image/*">
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary submit-btn">수정 완료</button>
    </form>
  </div>

  <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
  <script>
    const CSRF = "{{ csrf_token }}";
    const UPLOAD_URL = "{% url 'upload_image_ajax' %}";

    // Toast UI Editor 초기화
    const editor = new toastui.Editor({
      el: document.querySelector('#editor'),
      height: '600px',
      initialEditType: 'wysiwyg',
      initialValue: document.getElementById('content_hidden').value,
      previewStyle: 'tab',
      toolbarItems: [
        ['heading', 'bold', 'italic', 'strike'],
        ['hr', 'quote'],
        ['ul', 'ol', 'task'],
        ['table', 'image', 'link'],
        ['code', 'codeblock'],
      ],
      hooks: {
        addImageBlobHook: async (blob, callback) => {
          const formData = new FormData();
          formData.append("image", blob);
          const res = await fetch(UPLOAD_URL, {
            method: "POST",
            body: formData,
            headers: { "X-CSRFToken": CSRF }
          });
          const data = await res.json();
          if (data.image_url) callback(data.image_url, "이미지");
          else alert("이미지 업로드 실패: " + data.error);
        }
      }
    });

    // 폼 제출 시 에디터 내용을 hidden textarea에 저장
    document.getElementById("post-form").addEventListener("submit", function() {
      document.getElementById("content_hidden").value = editor.getMarkdown();
    });

    // 카드 이미지
    function selectCardImage(imageUrl, imgElement) {
      document.getElementById("selected_card_image_hidden").value = imageUrl;
      const p = document.getElementById("selected_card_image_preview");
      p.src = imageUrl;
      p.style.display = "block";
      document.querySelectorAll("#card_image_gallery img").forEach(img => img.classList.remove("selected"));
      imgElement.classList.add("selected");
    }

    document.getElementById("upload_card_image").addEventListener("change", function() {
      const file = this.files[0];
      if (!file) return;
      const status = document.getElementById("upload_status");
      status.textContent = "⏫ 업로드 중...";
      const formData = new FormData();
      formData.append("image", file);
      fetch(UPLOAD_URL, {
        method: "POST",
        body: formData,
        headers: { "X-CSRFToken": CSRF }
      })
      .then(res => res.json())
      .then(data => {
        if (data.image_url) {
          document.getElementById("selected_card_image_hidden").value = data.image_url;
          const p = document.getElementById("selected_card_image_preview");
          p.src = data.image_url;
          p.style.display = "block";
          status.textContent = "✅ 업로드 완료";
        } else {
          status.textContent = "❌ 업로드 실패: " + data.error;
        }
      })
      .catch(() => { status.textContent = "❌ 업로드 오류"; });
    });

    // 작성자 직접 입력 처리
    function setupAuthorSelect(selectId, customInputId, hiddenName) {
      const sel = document.querySelector(`select[name="${selectId}"]`);
      const inp = document.getElementById(customInputId);
      sel.addEventListener("change", function() {
        if (this.value === "__custom__") {
          inp.style.display = "block";
          inp.name = selectId;
          this.name = "";
        } else {
          inp.style.display = "none";
          inp.name = "";
          this.name = selectId;
        }
      });
    }
    setupAuthorSelect("author", "author_custom");
    setupAuthorSelect("author2", "author2_custom");
  </script>
</body>
</html>
